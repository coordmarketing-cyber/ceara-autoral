/BARRO","s":"VALIDADO","link":"Instagram - https://www.instagram.com/ceramicaobaiano/","c":"Ateliê de cerâmica de Fortaleza com produção artesanal voltada para peças decorativas e funcionais com forte identidade visual. Trabalho reconhecido pela qualidade do acabamento e pela capacidade de produção consistente, com peças que dialogam com ambientes residenciais contemporâneos.","fotos":[],"folderId":"1rGdTBm7por2FQYG8Gb5GU3Mh9DRkYJSr","img":null},{"id":"11799180859","n":"Simone Sousa","l":"Vale do Catimbau/PE","p":"CERÂMICA/BARRO","s":"AVALIAR","link":"Instagram - https://www.instagram.com/simonesouzaarte/?g=5","c":"Artista ceramista do Vale do Catimbau, em Pernambuco, região de singular riqueza cultural e natural. Produz peças em barro com referências da paisagem e da cultura do sertão pernambucano, unindo técnica artesanal e sensibilidade estética com forte senso de lugar.","fotos":[],"folderId":null,"img":null},{"id":"11799715160","n":"Arrudiando a mesa","l":"Paraíba","p":"CERÂMICA/BARRO","s":"AVALIAR","link":"Instagram - https://www.instagram.com/arrudiandoamesa/?g=5","c":"Projeto paraibano de cerâmica e artes da mesa que reinterpreta a cultura popular nordestina em peças funcionais para uso cotidiano. Foco em louças e objetos de mesa com identidade regional, unindo estética contemporânea e referências culturais do Nordeste.","fotos":[],"folderId":null,"img":null},{"id":"11799636537","n":"Dheny Santos Ceramista","l":"Pernambuco","p":"CERÂMICA/BARRO","s":"AVALIAR","link":"Instagram - https://www.instagram.com/dheny_santos.ceramista/?g=5","c":"Ceramista pernambucana com produção autoral focada em peças escultóricas e decorativas que exploram formas orgânicas e texturas. Trabalho com presença crescente no circuito de design e artesanato do Nordeste, com identidade visual própria e técnica apurada.","fotos":[],"folderId":"1PVlbNHxlTvxIUzr9XWA2_dFhoC4OVsM6","img":null},{"id":"18335186088","n":"Tecê Studio® | Macramê e artefatos têxteis","l":"Fortaleza/CE","p":"TECELAG
